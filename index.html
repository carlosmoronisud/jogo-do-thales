<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>MathQuest 🚀</title>
  
<!-- CSS Modular -->
<link rel="stylesheet" href="css/core.css" />
<link rel="stylesheet" href="css/operators.css" />
<link rel="stylesheet" href="css/fractions.css" />
<link rel="stylesheet" href="css/timestable.css" />
<link rel="stylesheet" href="css/shooter.css" />
<link rel="stylesheet" href="css/flags.css" />  

  
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- TELA 1: PERFIS -->
  <div id="screen-profiles" class="screen active">
    <div class="screen-inner">
      <div class="logo-wrap">
        <div class="logo-icon">🚀</div>
        <h1 class="logo-title">MathQuest</h1>
        <p class="logo-sub">Aventuras Matemáticas</p>
      </div>

      <div class="profiles-list" id="profiles-list"></div>

      <button class="btn btn-add" id="btn-new-profile">
        <span class="btn-icon">➕</span> Novo Jogador
      </button>
    </div>
  </div>

  <!-- MODAL: CRIAR PERFIL -->
  <div id="modal-create" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-emoji">🧒</div>
      <h2 class="modal-title">Qual é o seu nome?</h2>
      <input type="text" id="input-name" class="modal-input" placeholder="Digite seu nome..." maxlength="16" autocomplete="off" />
      <div class="modal-row">
        <button class="btn btn-cancel" id="btn-cancel-profile">Cancelar</button>
        <button class="btn btn-confirm" id="btn-confirm-profile">Entrar!</button>
      </div>
    </div>
  </div>

  <!-- TELA 2: MENU PRINCIPAL -->
  <div id="screen-menu" class="screen hidden">
    <div class="screen-inner">
      <div class="menu-header">
        <div class="player-badge">
          <div class="player-avatar" id="menu-avatar">🧒</div>
          <div class="player-info">
            <span class="player-name" id="menu-player-name">Jogador</span>
            <span class="player-score-label">Pontuação</span>
          </div>
          <div class="player-score-big" id="menu-player-score">0</div>
        </div>
        <button class="btn-icon-only" id="btn-switch-player" title="Trocar jogador">🔄</button>
      </div>

      <div class="section-title">🎮 Minijogos</div>
      <div class="minigames-grid" id="minigames-grid"></div>

      <div class="section-title">🏆 Ranking</div>
      <div class="ranking-list" id="ranking-list"></div>
    </div>
  </div>

  <!-- TELA 3: MINIJOGO -->
  <div id="screen-game" class="screen hidden">
    <div class="screen-inner">
      <div class="game-header">
        <button class="btn-back" id="btn-back-menu">← Menu</button>
        <div class="game-progress-wrap">
          <div class="game-progress-bar" id="game-progress-bar"></div>
        </div>
        <div class="game-score-pill" id="game-score-pill">+0</div>
      </div>
      
      <div id="game-container"></div>
      
      <div class="feedback-banner hidden" id="feedback-banner">
        <span id="feedback-text">✅ Correto!</span>
      </div>
    </div>
  </div>

  <!-- TELA 4: RESULTADO DA RODADA -->
  <div id="screen-result" class="screen hidden">
    <div class="screen-inner result-inner">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 class="result-title" id="result-title">Rodada Concluída!</h2>
      <div class="result-stats">
        <div class="stat-box">
          <div class="stat-value" id="stat-correct">0</div>
          <div class="stat-label">Acertos</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-wrong">0</div>
          <div class="stat-label">Erros</div>
        </div>
        <div class="stat-box stat-box-highlight">
          <div class="stat-value" id="stat-points">+0</div>
          <div class="stat-label">Pontos</div>
        </div>
      </div>
      <div class="bonus-banner hidden" id="bonus-banner">
        🌟 Bônus de Rodada! +20 pontos
      </div>
      <div class="result-total-wrap">
        <span class="result-total-label">Total geral:</span>
        <span class="result-total-score" id="result-total-score">0</span>
      </div>
      <button class="btn btn-primary btn-large" id="btn-result-menu">Voltar ao Menu 🏠</button>
      <button class="btn btn-secondary btn-large" id="btn-play-again">Jogar de Novo 🔄</button>
    </div>
  </div>

  <!-- JavaScript Modular -->
<script src="js/core/GameState.js"></script>
<script src="js/core/GameRegistry.js"></script>
<script src="js/core/GameEngine.js"></script>
<script src="js/core/UIManager.js"></script>
<script src="js/games/OperatorsGame.js"></script>
<script src="js/games/FractionsGame.js"></script>
<script src="js/games/TimesTableGame.js"></script>
<script src="js/games/NumberShooterGame.js"></script>
<script src="js/games/FlagsGame.js"></script>
<script src="js/main.js"></script>
</body>
</html>
